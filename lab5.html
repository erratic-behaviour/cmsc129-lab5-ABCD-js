<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="lab5.css">
        
        <title>ABCD CRS</title>
    </head>
    <body>

            <header>
                <h2>Welcome to</h2>
                <h1 id="main-title">ABCD Mini CRS</h1>
            </header>

            <div id="show-date-time" class="container">
                <h2>Date Checker</h2>
                <button onclick="time_now()">Show Current Date</button>
                <p><time id="currentDate"></time></p>
                <p><time id="currentTime"></time></p>
            </div>


            <!-- FORM for Student Data -->
            <div id="form" class="container">
                <h2>Personal Data Input</h2>
                <form>
                    <p class="form-text">Name</p>
                    <input type="text" id="name" placeholder="Enter your name here">

                    <p class="form-text">Age</p>
                    <input type="number" id="age" placeholder="Enter your age here">

                    <p class="form-text">Email</p>
                    <input type="email" id="email" placeholder="Enter your email here">

                    <p class="form-text">Course</p>
                    <input type="checkbox" id="course">

                    <button type="button" onclick="addStudent()">Submit</button>
                </form>
            </div>
            
            <!-- SEARCH students -->
            <div id="search-student" class="container">
                <h2>Search Student</h2>
                <p class="form-text">Search Student (input student no.)</p>
                <input type="number" id="searchInput">

                <button onclick="findStudent()">Search</button>
                
                <div id="studentDisplay"></div>
                <div id="studentList"></div>

                <button onclick="displayList()">Display All</button>
            </div>

            <script src="lab5_scripts.js"></script>
        </body>
</html>
